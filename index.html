<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    />
    <title>Um presente para você</title>
    <link rel="stylesheet" href="styles.css?v=paper-letter-purple-11" />
  </head>
  <body>
    <canvas id="particles" aria-hidden="true"></canvas>

    <div class="background-doodles" aria-hidden="true">
      <span>♡</span>
      <span>✦</span>
      <span>⌁</span>
      <span>✧</span>
      <span>☾</span>
      <span>♡</span>
      <span>✦</span>
      <span>⌁</span>
    </div>

    <main class="scene" aria-live="polite">
      <section class="gift" id="gift">
        <div class="letter-panel" id="letterPanel">
          <article class="letter">
            <p class="letter-title">Amor,</p>
            <p>Só queria te agradecer por tornar tudo tão incrível.</p>
            <p>
              Você trouxe de volta o meu sorriso mais brilhante e uma felicidade
              que eu nem sabia o quanto sentia falta.
            </p>
            <p>Sou muito grata por ter você comigo. 🤍</p>

            <button class="bloom-button" id="bloomButton" type="button">
              florescer
            </button>
          </article>
        </div>

        <div class="envelope" aria-label="Envelope com uma carta">
          <div class="envelope-back"></div>
          <div class="envelope-paper"></div>
          <div class="envelope-flap"></div>
          <div class="envelope-pocket"></div>

          <button class="open-letter" id="openLetter" type="button">
            <span class="bird">♡</span>
            <span>Um passarinho deixou isso para você...</span>
          </button>
        </div>

        <div class="flower flower-one"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        <div class="flower flower-two"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        <div class="flower flower-three"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        <div class="flower flower-four"><i></i><i></i><i></i><i></i><i></i><b></b></div>
        <div class="flower flower-five"><i></i><i></i><i></i><i></i><i></i><b></b></div>
      </section>
    </main>

    <script src="script.js?v=paper-letter-purple-11"></script>
  </body>
</html>
